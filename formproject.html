<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOOT PARTNER USER LOGIN</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, rgb(10, 84, 141), rgb(34, 139, 230));
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            padding-top: 100px;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgb(10, 84, 141);
            color: white;
            text-align: center;
            font-size: 35px;
            font-weight: bold;
            padding: 20px;
            box-shadow: 0px 2px 10px gray;
        }

        div {
            width: 430px;
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
        }

        label {
            font-size: 18px;
            font-weight: bold;
            color: rgb(10,84,141);
        }

        .box {
            width: 95%;
            height: 40px;
            border-radius: 8px;
            border: 1px solid #bbb;
            padding-left: 10px;
            font-size: 16px;
            margin-top: 5px;
            margin-bottom: 10px;
        }

        .box:focus {
            border: 2px solid rgb(10,84,141);
            outline: none;
        }

        textarea {
            width: 95%;
            height: 70px;
            border-radius: 8px;
            border: 1px solid #bbb;
            padding: 10px;
            font-size: 16px;
            resize: none;
            margin-top: 5px;
            margin-bottom: 10px;
        }

        textarea:focus {
            border: 2px solid rgb(10,84,141);
            outline: none;
        }

        select {
            width: 95%;
            height: 40px;
            border-radius: 8px;
            border: 1px solid #bbb;
            margin-top: 5px;
            margin-bottom: 10px;
        }

        input[type="radio"],
        input[type="checkbox"] {
            margin-top: 10px;
            margin-right: 8px;
        }

        button {
            width: 95%;
            height: 45px;
            background-color: rgb(10,84,141);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background-color: rgb(6,60,104);
        }

        p {
            color: red;
            font-size: 14px;
            margin-top: -5px;
            margin-bottom: 8px;
        }

        .output {
            width: 430px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
            margin-left: 50px;
            background-color: white;
            display: none;
        
        }
    
        .output h1 {
            color: rgb(60,60,60);
            border-bottom: 2px solid #ddd;
            padding-bottom: 8px;
        }
    </style>

</head>

<body>

    <header>FOOT PARTNER LOGIN FORM</header>

    <div>

        <label>Full Name:</label><br>
        <input id="name" class="box"><br>
        <p id="notfill1" style="color:red;"></p>

        <label>Email:</label><br>
        <input id="email" type="email" class="box"><br>
        <p id="notfill2" style="color:red;"></p>

        <label>Address:</label><br>
        <textarea id="Address" style="width:300px;height:40px;border-radius:9px;"></textarea><br>
        <p id="notfill3" style="color:red;"></p>

        <label>Gender:</label><br>

        <input type="radio" name="Gender" value="Male"> Male
        <input type="radio" name="Gender" value="Female"> Female
        <p id="notfill4" style="color:red;"></p>

        <label>Foot Size:</label><br>

        <select id="qualification">
            <option value="">Select Foot Size</option>
            <option>UK 5</option>
            <option>UK 6</option>
            <option>UK 7</option>
            <option>UK 8</option>
            <option>UK 9</option>
            <option>UK 10</option>
            <option>UK 11</option>
        </select>

        <p id="notfill5" style="color:red;"></p>

        <label>User Interest:</label><br>

        <input type="checkbox" name="skill" value="Nike"> Nike <br>
        <input type="checkbox" name="skill" value="Adidas"> Adidas <br>
        <input type="checkbox" name="skill" value="Puma"> Puma <br>
        <input type="checkbox" name="skill" value="Reebok"> Reebok <br>
        <input type="checkbox" name="skill" value="New Balance"> New Balance <br>
        <input type="checkbox" name="skill" value="Skechers"> Skechers

        <p id="notfill6" style="color:red;"></p>

        <button onclick="display()" style="width:300px;
              height:40px;
              background-color:rgb(10,10,121);
              color:white;
              border:none;
              border-radius:8px;
              margin-top:20px;
              margin-bottom:20px;">
            PREVIEW
        </button>

    </div>

    <div id="output" class="output">

        <label style="color:blue;">NAME:</label>
        <p style="color:chocolate;" id="one"></p>

        <label style="color:blue;">EMAIL:</label>
        <p style="color:chocolate;" id="two"></p>

        <label style="color:blue;">ADDRESS:</label>
        <p style="color:chocolate;" id="three"></p>

        <label style="color:blue;">GENDER:</label>
        <p style="color:chocolate;" id="four"></p>

        <label style="color:blue;">FOOT SIZE:</label>
        <p style="color:chocolate;" id="five"></p>

        <label style="color:blue;">USER INTEREST:</label>
        <p style="color:chocolate;" id="six"></p>

        <button onclick="submitForm()" style="width:300px;
                height:40px;
                background-color:green;
                color:white;
                border:none;
                border-radius:8px;
                margin-top:20px;">
            SUBMIT
        </button>

    </div>
<script>

function validate() {

    var name = document.getElementById("name").value.trim();
    var email = document.getElementById("email").value.trim();
    var address = document.getElementById("Address").value.trim();

    document.getElementById("notfill1").innerText = "";
    document.getElementById("notfill2").innerText = "";
    document.getElementById("notfill3").innerText = "";
    document.getElementById("notfill4").innerText = "";
    document.getElementById("notfill5").innerText = "";
    document.getElementById("notfill6").innerText = "";

    var valid = true;

    if (name == "") {
        document.getElementById("notfill1").innerText = "Name is required";
        valid = false;
    }

    if (email == "") {
        document.getElementById("notfill2").innerText = "Email is required";
        valid = false;
    }

    if (address == "") {
        document.getElementById("notfill3").innerText = "Address is required";
        valid = false;
    }

    var gender = "";
    var genders = document.getElementsByName("Gender");

    for (var i = 0; i < genders.length; i++) {
        if (genders[i].checked) {
            gender = genders[i].value;
        }
    }

    if (gender == "") {
        document.getElementById("notfill4").innerText = "Please select Gender";
        valid = false;
    }

    var qualification = document.getElementById("qualification").value;

    if (qualification == "") {
        document.getElementById("notfill5").innerText = "Select Foot Size";
        valid = false;
    }

    var skills = [];
    var checkboxes = document.getElementsByName("skill");

    for (var i = 0; i < checkboxes.length; i++) {
        if (checkboxes[i].checked) {
            skills.push(checkboxes[i].value);
        }
    }

    if (skills.length == 0) {
        document.getElementById("notfill6").innerText = "Select at least one Interest";
        valid = false;
    }

    return valid;
}


// Live validation
document.getElementById("name").addEventListener("input", validate);
document.getElementById("email").addEventListener("input", validate);
document.getElementById("Address").addEventListener("input", validate);
document.getElementById("qualification").addEventListener("change", validate);

var genders = document.getElementsByName("Gender");
for (var i = 0; i < genders.length; i++) {
    genders[i].addEventListener("change", validate);
}

var checkboxes = document.getElementsByName("skill");
for (var i = 0; i < checkboxes.length; i++) {
    checkboxes[i].addEventListener("change", validate);
}


// Preview button
function display() {

    if (!validate()) {
        document.getElementById("output").style.display = "none";
        return;
    }

    var name = document.getElementById("name").value.trim();
    var email = document.getElementById("email").value.trim();
    var address = document.getElementById("Address").value.trim();

    var gender = "";
    var genders = document.getElementsByName("Gender");

    for (var i = 0; i < genders.length; i++) {
        if (genders[i].checked) {
            gender = genders[i].value;
        }
    }

    var qualification = document.getElementById("qualification").value;

    var skills = [];
    var checkboxes = document.getElementsByName("skill");

    for (var i = 0; i < checkboxes.length; i++) {
        if (checkboxes[i].checked) {
            skills.push(checkboxes[i].value);
        }
    }

    document.getElementById("output").style.display = "block";

    document.getElementById("one").innerText = name;
    document.getElementById("two").innerText = email;
    document.getElementById("three").innerText = address;
    document.getElementById("four").innerText = gender;
    document.getElementById("five").innerText = qualification;
    document.getElementById("six").innerText = skills.join(", ");
}


// Submit button
function submitForm() {

    alert("Login Successfully");

    window.location.href = "index.html";
}

</script>
</body>

</html>
